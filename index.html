<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Samurai Game</title>
    <style>
      body {
        margin: 0;
        background: #222;
        overflow: hidden;
      }

      canvas {
        background: #333;
        display: block;
        margin: auto;
      }
    </style>
  </head>

  <body>
    <canvas id="game"></canvas>

    <div
      id="modal"
      style="
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        color: white;
        font-family: sans-serif;
        font-size: 32px;
      "
    >
      <div id="modal-text"></div>

      <button
        onclick="restart()"
        style="margin-top: 20px; padding: 10px 20px; font-size: 18px"
      >
        Restart
      </button>
    </div>

    <!-- script di bawah body -->
    <script src="game.js"></script>
  </body>
</html>
